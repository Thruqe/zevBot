name: Release Management
on:
  push:
    branches:
      - master
permissions:
  contents: write
jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Parse and Compare Versions
        id: version-check
        run: |
          CURRENT_VERSION=$(git show HEAD:version.toml | sed -n 's/^version = "\(.*\)"/\1/p')
          echo "Current version: $CURRENT_VERSION"

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            OLD_VERSION=$(git show HEAD~1:version.toml | sed -n 's/^version = "\(.*\)"/\1/p')
          else
            OLD_VERSION=""
          fi
          echo "Previous version: $OLD_VERSION"

          if [ "$CURRENT_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi
  build:
    name: Build Release Binary
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Go Toolchain
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install GCC (required for CGO/go-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build Binary
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o zevBot .
      - name: Package Asset
        run: |
          mkdir staging
          cp zevBot staging/
          cp LICENSE staging/ 2>/dev/null || true
          cp README.md staging/ 2>/dev/null || true
          tar -czf zevBot-linux-amd64.tar.gz -C staging .
      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: zevBot-linux-amd64.tar.gz
  alpha-release:
    name: Alpha Per-Commit Release
    needs: [check-version, build]
    if: needs.check-version.outputs.changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary
      - name: Get Commit Info
        id: commit-info
        run: |
          echo "subject=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          git log -1 --format='%b' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Publish Alpha Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha
          name: "Alpha Build"
          body: |
            **${{ steps.commit-info.outputs.subject }}**

            ${{ steps.commit-info.outputs.body }}

            **Commit:** ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: zevBot-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  production-release:
    name: Production Release
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code for Tagging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary
      - name: Create Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
      - name: Publish Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          name: "Release v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: zevBot-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
